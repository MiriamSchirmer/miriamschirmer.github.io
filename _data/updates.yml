- date: "Mar, 2026"
  content: "✈️ From one *bean town* to the next: I've left Chicago behind to start a visiting postdoc position the [Digital Emotions Lab](https://www.amitgoldenberg.com) at **Harvard Business School**."

- date: "Jan, 2026"
  content: "📺 Our [paper](https://journalqd.org/article/view/9514) on **Just Another Hour on TikTok** was published in *Journal of Quantitative Description: Digital Media*. Covered by a [piece](https://www.economist.com/graphic-detail/2025/09/26/what-are-tiktoks-new-owners-buying) in *The Economist*."

- date: "Dec, 2025"
  content: "🏆 I received the **Dissertation Award** of the [Freunde der TUM e.V.](https://www.freunde.tum.de/bdf/preise/preise-2025/) of the Technical University of Munich for my dissertation on **NLP for Violence Studies**."

- date: "Dec, 2025"
  content: "🗣️ I presented ongoing work on **hostility against scientists** at the [2025 MIT Polarization Workshop](https://sites.google.com/view/polarization-workshop)."

- date: "Nov, 2025"
  content: "⚖️ It was a privilege to visit the **Human Rights Center** at **UC Berkeley** School of Law to discuss practical questions related to my work on **online hate speech**."

- date: "Nov, 2025"
  content: "🧑‍🏫 Taught a workshop on Named Entity Recognition for beginners at Northwestern University. Find the materials [here](https://github.com/MiriamSchirmer/Intro-to-NER)."

- date: "Oct, 2025"
  content: "🎯 I'll be attending the second part of the [GSO Acacemic Leadership Academy](https://gsonet.org/funding-programs/leadership-academy/?lang=en) in Heidelberg. Looking forward to reconnecting with everyone!"

- date: "Aug 1, 2025"
  content: "🎡 I presented my new paper on [Detecting Child Objectification on Social Media](https://aclanthology.org/2025.woah-1.36/) at **WOAH** @ **ACL 2025** in Vienna."

- date: "Jul 17, 2025"
  content: "📄 New [commentary](https://misinforeview.hks.harvard.edu/article/disparities-by-design-toward-a-research-agenda-that-links-science-misinformation-and-socioeconomic-marginalization-in-the-age-of-ai/) published in the **Harvard Kennedy School Misinformation Review** on the need to establish a research agenda that links science misinformation and socioeconomic marginalization in the age of AI."

- date: "June-July, 2025"
  content: "🌎 I spent a great summer traveling Europe for conferences to present a [tutorial on AI and misinformation](https://sites.google.com/view/ic2s2-misinformation-and-ai/startseite) (@ [ICWSM](https://www.icwsm.org/2025/index.html) and [IC2S2](https://www.ic2s2-2025.org))."

- date: "April 24, 2025"
  content: "📄 New [preprint](https://arxiv.org/abs/2504.13279) on what the overall extent of data on TikTok looks like. Huge dataset of **Just Another Hour on TikTok**."

- date: "Dec 11, 2024"
  content: "📄 Abstract accepted at the [ECPR](https://ecpr.eu/Events/Event/WorkshopDetails/15709) Workshop on **Text-as-Data Analysis in Political Science** with lead author **Sophie Brandt**."

- date: "Nov 14, 2024"
  content: "🌴 I presented my recent paper on [The Language of Trauma](https://aclanthology.org/2024.findings-emnlp.773) at **EMNLP 2024** in Miami. Thanks to all of you who stopped by to discuss!"

- date: "Nov 1, 2024"
  content: "👩‍🎓 I started my new position as a **postdoc at Northwestern University's** [LINK Lab](https://link.soc.northwestern.edu/about-us/). Looking forward to working with **Ágnes Horvát** and her amazing team!"

- date: "Oct 21, 2024"
  content: "🎉 I DEFENDED MY PHD! **#PhDone**"

- date: "Apr 23, 2024"
  content: "🌎 Part 2/2 of my 2024 research stay series: Thanks to **David Jurgens** at **University of Michigan School of Information's** [Blablablab](https://blablablab.si.umich.edu) for welcoming me in Ann Arbor to work on automated **detection of psychological trauma in text**."

- date: "Feb 13, 2024"
  content: "🌎 Arrived at **University of Cambridge** for part 1/2 of my 2024 research stay series. I'll be working on **LLMs for hate speech detection** with **Petre Breazu** and **Napoleon Katsos** at the department of [Theoretical and Applied Linguistics](https://www.mmll.cam.ac.uk/nk248)."
